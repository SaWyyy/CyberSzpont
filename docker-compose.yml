version: '3.8'

services:
  # 1. BAZA DANYCH METADANYCH
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: secuser
      POSTGRES_PASSWORD: secpassword
      POSTGRES_DB: secuscan
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secuser -d secuscan"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  # 2. MESSAGE BROKER (KOLEJKA ZADAŃ)
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  # 3. MAGAZYN OBIEKTOWY (STORAGE NA PLIKI)
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000" # API
      - "9001:9001" # Panel UI do podglądu plików
    restart: unless-stopped

  # 4. SILNIK SKANERA ANTYWIRUSOWEGO
  clamav:
    image: clamav/clamav:latest
    environment:
      - CLAMAV_NO_FRESHCLAMD=true 
    healthcheck:
      # Puka do portu 3310 i pyta czy ClamAV odpowiada
      test: ["CMD-SHELL", "echo 'PING' | nc -w 5 localhost 3310 | grep PONG || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60 # Czeka maksymalnie 10 minut
    restart: unless-stopped

  # 5. NASZE API (FASTAPI)
  upload-service:
    build: ./upload-service
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password123
      REDIS_HOST: redis
      DB_HOST: postgres
      DB_USER: secuser
      DB_PASS: secpassword
      DB_NAME: secuscan
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped

  # 6. NASZ WORKER SKANUJĄCY (PYTHON)
  scanner-worker:
    build: ./scanner-worker
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password123
      REDIS_HOST: redis
      DB_HOST: postgres
      DB_USER: secuser
      DB_PASS: secpassword
      DB_NAME: secuscan
      CLAMAV_HOST: clamav
    depends_on:
      redis:
        condition: service_started
      clamav:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # 7. FRONTEND (REACT + NGINX)
  frontend:
    build: ./frontend
    depends_on:
      - upload-service
    restart: unless-stopped

  # 8. API GATEWAY (Główny strażnik - jedyny otwarty na świat)
  api-gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - upload-service
    restart: unless-stopped